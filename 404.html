// ─── HOOK ───
function useProgress() {
  const load = () => { try { return JSON.parse(localStorage.getItem("ks3")||"[]"); } catch { return []; } };
  const [done, setDone] = useState(load);
  const pct = Math.round(done.length/MODS.length*100);
  const complete = id => setDone(prev => {
    if (prev.includes(id)) return prev;
    const n=[...prev,id]; localStorage.setItem("ks3",JSON.stringify(n)); return n;
  });
  const reset = () => { setDone([]); localStorage.removeItem("ks3"); };
  const earned = BADGES.filter(b=>b.req({d:done.length,p:pct}));
  return {done,pct,complete,reset,earned};
}

function ModModal({mod,done,onClose,onComplete}) {
  if (!mod) return null;
  if (mod.id===1) return <L1Detail done={done} onClose={onClose} onComplete={onComplete} />;
  if (mod.id===2) return <L2RoleDetail done={done} onClose={onClose} onComplete={onComplete} />;
  if (mod.id===3) return <L2ContextDetail done={done} onClose={onClose} onComplete={onComplete} />;
  if (mod.id===4) return <L2FormatDetail done={done} onClose={onClose} onComplete={onComplete} />;
  if (mod.id===5) return <L3CoTDetail done={done} onClose={onClose} onComplete={onComplete} />;
  if (mod.id===6) return <L3FewShotDetail done={done} onClose={onClose} onComplete={onComplete} />;
  if (mod.id===7) return <L3IterativeDetail done={done} onClose={onClose} onComplete={onComplete} />;
  return <GenericModal mod={mod} done={done} onClose={onClose} onComplete={onComplete} />;
}

                  <div style={{width:`${lvPct}%`,height:"100%",background:color,borderRadius:100,transition:"width 1.2s ease"}} />
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

// ─── LEARNING ───
function Learning({done,openMod}) {
  const lvNames={1:"초보",2:"입문",3:"중급",4:"고급",5:"마스터"};
  return (
    <section style={{padding:"80px 20px",background:C.bg}}>
      <div style={{maxWidth:920,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:44}}>
          <p style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>MODULES</p>
          <h2 style={{fontFamily:"'Noto Serif KR',serif",color:C.text,fontSize:"clamp(1.7rem,4vw,2.4rem)",fontWeight:900,marginBottom:9}}>단계별 학습 모듈</h2>
          <p style={{color:C.muted}}>김실장과 함께 프롬프트 엔지니어링을 마스터하세요</p>
        </div>
        {[1,2,3,4,5].map(l=>{
          const mods=MODS.filter(m=>m.lv===l);
          const dc=mods.filter(m=>done.includes(m.id)).length;
          return (
            <div key={l} style={{marginBottom:34}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:13}}>
                <div style={{width:25,height:25,borderRadius:"50%",background:lc(l),display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:11}}>{l}</div>
                <span style={{color:C.text,fontWeight:800,fontSize:"0.95rem"}}>Level {l}: {lvNames[l]}</span>
                <div style={{flex:1,height:1,background:C.border}} />
                <span style={{color:lc(l),fontSize:11,fontWeight:600}}>{dc}/{mods.length} 완료</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:12}}>
                {mods.map(m=>{
                  const isDone=done.includes(m.id);
                  const hasDetail=m.id<=4;
                  return (
                    <div key={m.id} className="mc" onClick={()=>openMod(m)} style={{background:"#fff",border:"1px solid "+(isDone?lc(l)+"50":"rgba(0,0,0,0.08)"),borderRadius:13,padding:"17px 15px",position:"relative",boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
                      {isDone&&<div style={{position:"absolute",top:9,right:9,background:lc(l),color:"#fff",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700}}>✓</div>}
                      <div style={{fontSize:22,marginBottom:8}}>{m.icon}</div>
                      <span style={{background:lc(l)+"18",color:lc(l),fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:100}}>L{l}</span>
                      <h3 style={{color:C.text,fontSize:"0.87rem",fontWeight:700,margin:"7px 0 3px"}}>{m.title}</h3>
                      <p style={{color:C.faint,fontSize:11,lineHeight:1.5}}>{m.desc}</p>
                      {hasDetail&&<p style={{color:lc(l),fontSize:10,fontWeight:700,marginTop:6}}>상세 학습 →</p>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

// ─── PROGRESS ───
function Progress({done,pct,earned,reset,go}) {
  const lvNames={1:"초보",2:"입문",3:"중급",4:"고급",5:"마스터"};
  const cur=Math.min(5,Math.floor(pct/20)+1);
  return (
    <section style={{padding:"80px 20px",background:C.bg,minHeight:"100vh"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:44}}>
          <p style={{color:C.gold,fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>MY PROGRESS</p>
          <h2 style={{fontFamily:"'Noto Serif KR',serif",color:C.text,fontSize:"clamp(1.7rem,4vw,2.2rem)",fontWeight:900,marginBottom:9}}>나의 학습 진행률</h2>
          <p style={{color:C.muted}}>현재 당신은 어느 레벨인가요?</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:11,marginBottom:24}}>
          {[[`${pct}%`,"전체 진행률",C.gold],[`${done.length} / 14`,"완료 모듈",lc(cur)],[`Lv.${cur} ${lvNames[cur]}`,"현재 레벨",lc(cur)]].map(([v,l,c])=>(
            <div key={l} style={{background:"#fff",border:"1px solid rgba(0,0,0,0.07)",borderRadius:13,padding:16,textAlign:"center",boxShadow:"0 2px 7px rgba(0,0,0,0.04)"}}>
              <div style={{color:c,fontSize:"1.3rem",fontWeight:900,marginBottom:5}}>{v}</div>
              <div style={{color:C.faint,fontSize:11}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:26}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.muted,marginBottom:6}}><span>{pct===0?"레벨을 시작해보세요!":pct>=100?"🎉 마스터 달성!":"다음 레벨까지 "+(20-(pct%20||20))+"% 남았습니다"}</span><span style={{color:C.gold,fontWeight:700}}>{pct}%</span></div>
          <div style={{background:"rgba(0,0,0,0.07)",borderRadius:100,height:9,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${C.gold},${C.goldL})`,borderRadius:100,transition:"width 1s ease"}} />
          </div>
        </div>
        <div style={{marginBottom:24}}>
          <h3 style={{color:C.text,fontWeight:700,marginBottom:12,fontSize:"0.92rem"}}>레벨별 진행 현황</h3>
          {[1,2,3,4,5].map(l=>{
            const mods=MODS.filter(m=>m.lv===l);
            const dc=mods.filter(m=>done.includes(m.id)).length;
            const lp=Math.round(dc/mods.length*100);
            return (
              <div key={l} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:lp===100?lc(l):"#EEF2FF",border:"2px solid "+lc(l),display:"flex",alignItems:"center",justifyContent:"center",color:lp===100?"#fff":lc(l),fontWeight:900,fontSize:11,flexShrink:0}}>{l}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.muted,marginBottom:3}}><span>{lvNames[l]}</span><span>{dc}/{mods.length}</span></div>
                  <div style={{background:"rgba(0,0,0,0.07)",borderRadius:100,height:4,overflow:"hidden"}}>
                    <div style={{width:`${lp}%`,height:"100%",background:lc(l),borderRadius:100,transition:"width 1s"}} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginBottom:24}}>
          <h3 style={{color:C.text,fontWeight:700,marginBottom:12,fontSize:"0.92rem"}}>획득한 배지</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
            {BADGES.map(b=>{
              const got=earned.some(e=>e.id===b.id);
              return (
                <div key={b.id} style={{textAlign:"center",width:85,padding:"12px 7px",background:got?"rgba(217,119,6,0.07)":"#F7F8FC",border:"1px solid "+(got?"rgba(217,119,6,0.22)":"rgba(0,0,0,0.07)"),borderRadius:12,filter:got?"none":"grayscale(1) opacity(0.35)"}}>
                  <div style={{fontSize:22,marginBottom:4}}>{b.icon}</div>
                  <div style={{color:got?C.gold:C.muted,fontWeight:700,fontSize:10}}>{b.name}</div>
                  <div style={{color:C.faint,fontSize:9,marginTop:2}}>{b.desc}</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="bg" onClick={()=>go("learning")} style={{background:`linear-gradient(135deg,${C.gold},${C.goldL})`,border:"none",borderRadius:10,padding:"11px 20px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>학습 계속하기</button>
          <button onClick={reset} style={{background:"transparent",border:"1px solid rgba(0,0,0,0.1)",borderRadius:10,padding:"11px 20px",color:C.muted,fontSize:13,cursor:"pointer"}}>진행률 초기화</button>
        </div>
      </div>
    </section>
  );
}

// ─── AI COACH ───
function Coach({onClose}) {
  const initMsg={role:"assistant",content:"안녕하세요! 저는 **김실장 AI 학습 코치**입니다. 😊

프롬프트 엔지니어링이 처음이셔도 걱정 마세요. 어떤 점이 궁금하신가요?"};
  const [msgs,setMsgs]=useState([initMsg]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const send=useCallback(async(text)=>{
    const q=(text||input).trim();
    if (!q||loading) return;
    setInput("");
    const next=[...msgs,{role:"user",content:q}];
    setMsgs(next);
    setLoading(true);
    try {
      const history=next.map(m=>({role:m.role,content:m.content}));
      const sliced=history.length>10?history.slice(-10):history;
      const apiMsgs=sliced[0]?.role==="assistant"?sliced.slice(1):sliced;
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:COACH_SYS,messages:apiMsgs})
      });
      if (!res.ok) {
        const err=await res.json().catch(()=>({}));
        const msg=err?.error?.message||("오류 "+res.status);
        setMsgs(p=>[...p,{role:"assistant",content:"오류가 발생했습니다: "+msg+"

↺ 초기화 버튼을 누르고 다시 시도해주세요. 😊"}]);
        setLoading(false); return;
      }
      const data=await res.json();
      const reply=data.content?.map(c=>c.text||"").join("")||"잠시 후 다시 시도해주세요.";
      setMsgs(p=>[...p,{role:"assistant",content:reply}]);
    } catch(e) {
      setMsgs(p=>[...p,{role:"assistant",content:"네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요. 😊"}]);
    }
    setLoading(false);
  },[msgs,input,loading]);

  const quick=["AI 처음인데 어디서 시작할까요?","CEO 보고서 프롬프트 만들어줘","역할 지정하는 법 알려줘","ESG 분석 프롬프트 예시 줘"];
  const renderM=t=>t.split("
").map((l,i)=><p key={i} style={{margin:"3px 0",lineHeight:1.7,fontSize:14}} dangerouslySetInnerHTML={{__html:l.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}} />);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1100,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}}>
      <style>{"@keyframes db{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}"}</style>
      <div style={{background:"#fff",border:"1px solid rgba(99,102,241,0.2)",borderRadius:"22px 22px 0 0",width:"100%",maxWidth:640,height:"82vh",display:"flex",flexDirection:"column",boxShadow:"0 -12px 48px rgba(0,0,0,.15)"}}>
        <div style={{padding:"15px 20px",borderBottom:"1px solid rgba(0,0,0,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🤖</div>
            <div>
              <div style={{color:C.text,fontWeight:800,fontSize:"0.88rem"}}>김실장 AI 학습 코치</div>
              <div style={{color:"#16a34a",fontSize:10,display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:"#22c55e",display:"inline-block"}} />온라인</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setMsgs([initMsg])} style={{background:"rgba(0,0,0,0.05)",border:"1px solid rgba(0,0,0,0.08)",color:C.muted,borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>↺ 초기화</button>
            <button onClick={onClose} style={{background:"rgba(0,0,0,0.06)",border:"none",color:C.muted,width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:18}}>×</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"15px 20px",display:"flex",flexDirection:"column",gap:12,background:"#F7F8FC"}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8}}>
              {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:3}}>🤖</div>}
              <div style={{maxWidth:"78%",padding:"10px 14px",borderRadius:m.role==="user"?"15px 15px 4px 15px":"4px 15px 15px 15px",background:m.role==="user"?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#fff",color:m.role==="user"?"#fff":C.text,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>{renderM(m.content)}</div>
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:8}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🤖</div>
              <div style={{padding:"10px 13px",background:"#fff",borderRadius:"4px 15px 15px 15px",display:"flex",gap:5,alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                {[0,1,2].map(j=><div key={j} style={{width:5,height:5,borderRadius:"50%",background:"#6366f1",animation:`db 1s ${j*0.2}s infinite`}} />)}
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>
        {msgs.length<=1&&(
          <div style={{padding:"7px 20px",display:"flex",flexWrap:"wrap",gap:5,background:"#fff",borderTop:"1px solid rgba(0,0,0,0.06)"}}>
            {quick.map(q=><button key={q} onClick={()=>send(q)} style={{background:"#EEF2FF",border:"1px solid rgba(99,102,241,0.22)",color:"#6366f1",borderRadius:100,padding:"4px 11px",fontSize:11,cursor:"pointer"}}>{q}</button>)}
          </div>
        )}
        <div style={{padding:"9px 20px 15px",borderTop:"1px solid rgba(0,0,0,0.07)",display:"flex",gap:8,background:"#fff",flexShrink:0}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="질문을 입력하세요..." style={{flex:1,background:"#F7F8FC",border:"1px solid rgba(0,0,0,0.08)",borderRadius:10,padding:"10px 13px",color:C.text,fontSize:13,outline:"none"}} />
          <button onClick={()=>send()} disabled={!input.trim()||loading} style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,padding:"10px 17px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13,opacity:(!input.trim()||loading)?.5:1}}>전송</button>
        </div>
      </div>
    </div>
  );
}

// ─── CTA + FOOTER ───

  return (
    <section style={{padding:"70px 20px",textAlign:"center",background:"radial-gradient(ellipse 70% 60% at 50% 50%,rgba(217,119,6,0.07) 0%,transparent 70%),#EEF2FF"}}>
      <h2 style={{fontFamily:"'Noto Serif KR',serif",color:C.text,fontSize:"clamp(1.5rem,4vw,2.2rem)",fontWeight:900,marginBottom:11}}>지금 바로 김실장의 여정을 시작하세요</h2>
      <p style={{color:C.muted,marginBottom:26}}>대기업 실무자를 위한 가장 실전적인 프롬프트 엔지니어링 교육</p>
      <div style={{display:"flex",gap:11,justifyContent:"center",flexWrap:"wrap"}}>
        <button className="bg" onClick={()=>go("learning")} style={{background:`linear-gradient(135deg,${C.gold},${C.goldL})`,border:"none",borderRadius:12,padding:"12px 26px",color:"#fff",fontWeight:900,fontSize:"0.95rem",cursor:"pointer",boxShadow:"0 6px 20px rgba(217,119,6,.28)"}}>학습 시작하기</button>
        <button onClick={()=>go("coach")} style={{background:"#EEF2FF",border:"1px solid rgba(99,102,241,0.25)",borderRadius:12,padding:"12px 26px",color:"#6366f1",fontWeight:700,fontSize:"0.95rem",cursor:"pointer"}}>🤖 AI 코치와 대화</button>
      </div>
    </section>
  );
}
function Footer({go}) {
  return (
    <footer style={{background:"#EEF2FF",borderTop:"1px solid rgba(0,0,0,0.07)",padding:"40px 20px 26px"}}>
      <div style={{maxWidth:900,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:24}}>
        <div>
          <h3 style={{fontFamily:"'Noto Serif KR',serif",color:C.gold,fontWeight:900,fontSize:"0.97rem",marginBottom:8}}>김실장의 AI 여정</h3>
          <p style={{color:C.muted,fontSize:12,lineHeight:1.7}}>대기업 실무자를 위한<br/>프롬프트 엔지니어링 마스터클래스</p>
        </div>
        <div>
          <h4 style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>빠른 링크</h4>
          {[["story","스토리"],["learning","학습하기"],["progress","진행률"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>go(id)} style={{display:"block",background:"none",border:"none",color:C.muted,fontSize:12,padding:"3px 0",cursor:"pointer"}}>{lbl}</button>
          ))}
        </div>
        <div>
          <h4 style={{color:C.muted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>관심 분야</h4>
          {["Carbon Credit","SCOP 3 Standard","REDD+","글로벌 기후환경 규제"].map(t=>(
            <div key={t} style={{display:"inline-block",background:"#fff",border:"1px solid rgba(0,0,0,0.08)",borderRadius:5,padding:"3px 7px",fontSize:10,color:C.muted,margin:"2px 3px 2px 0"}}>{t}</div>
          ))}
        </div>
      </div>
      <div style={{maxWidth:900,margin:"24px auto 0",borderTop:"1px solid rgba(0,0,0,0.07)",paddingTop:16,color:C.faint,fontSize:11,textAlign:"center"}}>
        © 2026 김실장의 AI 여정. Prompt Engineering for Corporate Leaders.
      </div>
    </footer>
  );
}

// ─── APP ───
function App() {
  const [sec,setSec]=useState("home");
  const [selMod,setSelMod]=useState(null);
  const [showCoach,setShowCoach]=useState(false);
  const {done,pct,complete,reset,earned}=useProgress();

  const go=s=>{
    if (s==="coach"){setShowCoach(true);return;}
    setSec(s);
    window.scrollTo({top:0,behavior:"smooth"});
  };

  return (
    <div style={{fontFamily:"'Noto Sans KR','Malgun Gothic',sans-serif",background:C.bg,minHeight:"100vh"}}>
      <GS />
      <Nav sec={sec} go={go} />
      <div style={{paddingTop:60}}>
        {sec==="home"&&<><Hero pct={pct} go={go} /><Story pct={pct} /><CTA go={go} /><Footer go={go} /></>}
        {sec==="story"&&<><Story pct={pct} /><CTA go={go} /><Footer go={go} /></>}
        {sec==="learning"&&<><Learning done={done} openMod={setSelMod} /><Footer go={go} /></>}
        {sec==="progress"&&<><Progress done={done} pct={pct} earned={earned} reset={reset} go={go} /><Footer go={go} /></>}
      </div>
      <button onClick={()=>setShowCoach(true)} style={{position:"fixed",bottom:24,right:24,zIndex:700,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",cursor:"pointer",fontSize:21,boxShadow:"0 6px 22px rgba(99,102,241,.46)",transition:"transform .2s"}} onMouseOver={e=>e.currentTarget.style.transform="scale(1.12)"} onMouseOut={e=>e.currentTarget.style.transform=""}>🤖</button>
      {selMod&&<ModModal mod={selMod} done={done} onClose={()=>setSelMod(null)} onComplete={complete} />}
      {showCoach&&<Coach onClose={()=>setShowCoach(false)} />}
    </div>
  );
}

const { useState, useEffect, useRef, useCallback } = React;
const rootEl = document.getElementById('root');
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));
  </script>
